name: Deploy Template Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create output directory
        run: mkdir -p _site

      - name: Copy manifest
        run: cp manifest.json _site/

      - name: Copy previews
        run: cp -r previews _site/

      - name: Generate index page
        run: |
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Catalogue des démos — ViteMonSite</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{
                font-family:system-ui,-apple-system,sans-serif;
                background:#F3F5F9;
                color:#1E293B;
                min-height:100vh;
                padding:clamp(1.5rem,4vw,3rem);
              }
              .container{max-width:1140px;margin:0 auto}
              .hero{
                padding:40px 44px;
                border-radius:20px;
                background:#ffffff;
                border:1px solid #DBEAFE;
                box-shadow:0 8px 40px rgba(29,78,216,.08), 0 1px 3px rgba(29,78,216,.06);
                margin-bottom:36px;
                position:relative;
                overflow:hidden;
              }
              .hero::before{
                content:"";
                position:absolute;
                inset:0;
                background:linear-gradient(135deg,rgba(219,234,254,.5) 0%,transparent 60%);
                pointer-events:none;
              }
              .kicker{
                display:inline-flex;
                align-items:center;
                gap:6px;
                padding:5px 12px;
                border-radius:999px;
                background:#EFF6FF;
                color:#1D4ED8;
                font-size:11px;
                font-weight:700;
                letter-spacing:.1em;
                text-transform:uppercase;
                margin-bottom:16px;
                border:1px solid #BFDBFE;
              }
              h1{
                font-size:clamp(2rem,5vw,3rem);
                font-weight:800;
                line-height:1.1;
                margin-bottom:14px;
                color:#0F172A;
                letter-spacing:-.02em;
              }
              h1 span{color:#1D4ED8}
              .sub{
                max-width:640px;
                color:#64748B;
                line-height:1.75;
                margin-bottom:24px;
                font-size:15px;
              }
              .cta{
                display:inline-flex;
                align-items:center;
                gap:8px;
                padding:11px 22px;
                border-radius:10px;
                background:#1D4ED8;
                color:#fff;
                text-decoration:none;
                font-weight:700;
                font-size:14px;
                box-shadow:0 4px 14px rgba(29,78,216,.35);
                transition:background .2s, box-shadow .2s, transform .15s;
              }
              .cta:hover{
                background:#1E40AF;
                box-shadow:0 6px 20px rgba(29,78,216,.45);
                transform:translateY(-1px);
              }
              .stats{
                display:flex;
                gap:24px;
                flex-wrap:wrap;
                margin-bottom:32px;
              }
              .stat{
                font-size:13px;
                color:#64748B;
              }
              .stat strong{color:#1D4ED8;font-weight:700}
              .grid{
                display:grid;
                grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
                gap:20px;
              }
              .card{
                display:block;
                text-decoration:none;
                color:inherit;
                border-radius:16px;
                overflow:hidden;
                background:#ffffff;
                border:1px solid #E2E8F0;
                box-shadow:0 4px 16px rgba(15,23,42,.05);
                transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
              }
              .card:hover{
                transform:translateY(-5px);
                box-shadow:0 16px 48px rgba(29,78,216,.12), 0 4px 12px rgba(15,23,42,.06);
                border-color:#BFDBFE;
              }
              .thumb{
                height:180px;
                background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
                display:flex;
                align-items:center;
                justify-content:center;
                overflow:hidden;
                position:relative;
              }
              .thumb img{
                width:100%;
                height:100%;
                object-fit:cover;
                object-position:top;
                display:block;
              }
              .thumb-fallback{
                width:100%;
                height:100%;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:44px;
              }
              .content{padding:18px 20px}
              .top{
                display:flex;
                align-items:flex-start;
                justify-content:space-between;
                gap:10px;
                margin-bottom:8px;
              }
              .badge{
                font-size:10px;
                font-weight:700;
                padding:4px 10px;
                border-radius:999px;
                white-space:nowrap;
                flex-shrink:0;
                margin-top:2px;
              }
              .badge-serenite{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
              .badge-croissance{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
              h3{
                font-size:15px;
                font-weight:700;
                line-height:1.3;
                color:#0F172A;
              }
              .card-sub{
                color:#64748B;
                font-size:13px;
                line-height:1.5;
                margin-bottom:14px;
              }
              .meta{
                display:flex;
                flex-wrap:wrap;
                gap:6px;
              }
              .chip{
                font-size:11px;
                font-weight:500;
                padding:4px 9px;
                border-radius:6px;
                background:#F8FAFC;
                color:#475569;
                border:1px solid #E2E8F0;
              }
              .arrow{
                display:flex;
                align-items:center;
                justify-content:flex-end;
                padding:10px 20px 14px;
                font-size:12px;
                font-weight:600;
                color:#1D4ED8;
                gap:4px;
              }
              .footer{
                margin-top:48px;
                padding-top:24px;
                border-top:1px solid #E2E8F0;
                text-align:center;
                color:#94A3B8;
                font-size:13px;
              }
              .footer a{color:#1D4ED8;text-decoration:none;font-weight:500}
              .footer a:hover{text-decoration:underline}
            </style>
          </head>
          <body>
            <div class="container">
              <section class="hero">
                <div class="kicker">⬡ ViteMonSite · LORN Digital Studio</div>
                <h1>Catalogue des <span>démos templates</span></h1>
                <p class="sub">
                  Sélection de templates artisans et commerces locaux. Chaque démo ouvre un site complet.
                  Formule Sérénité à partir de 49 €/mois, Croissance à 79 €/mois.
                </p>
                <div class="stats" id="stats"></div>
                <a class="cta" href="https://vitemonsite-artisan.fr" target="_blank" rel="noopener">
                  → Retour vers ViteMonSite
                </a>
              </section>

              <section class="grid" id="grid"></section>

              <div class="footer">
                Propulsé par <a href="https://lorn-digital-studio.fr" target="_blank" rel="noopener">LORN Digital Studio</a>
              </div>
            </div>

            <script>
              const icons = {
                batiment: "🏗️",
                "charpentier-couvreur": "🏚️",
                coiffure: "✂️",
                electricien: "⚡",
                fastfood: "🍔",
                barbershop: "💈",
                fleuriste: "💐",
                massage: "🧘",
                menuisier: "🪵",
                "paysagiste-elageur": "🌳",
                peintre: "🎨",
                plombier: "💧",
                restaurant: "🍽️"
              };

              fetch("./manifest.json")
                .then(r => r.json())
                .then(data => {
                  const grid = document.getElementById("grid");
                  const statsEl = document.getElementById("stats");
                  const total = data.templates.length;
                  const croissance = data.templates.filter(t => t.formule === "croissance").length;
                  const serenite = total - croissance;
                  statsEl.innerHTML = `
                    <span class="stat"><strong>${total}</strong> templates disponibles</span>
                    <span class="stat"><strong>${serenite}</strong> Sérénité</span>
                    <span class="stat"><strong>${croissance}</strong> Croissance</span>
                  `;
                  data.templates.forEach(t => {
                    const icon = icons[t.metier] || "✨";
                    const url = `./${t.id}/`;
                    const thumb = t.screenshot
                      ? `<img src="./${t.screenshot}" alt="${t.nom}" loading="lazy" />`
                      : `<div class="thumb-fallback">${icon}</div>`;
                    const badgeClass = t.formule === "croissance" ? "badge-croissance" : "badge-serenite";
                    grid.innerHTML += `
                      <a class="card" href="${url}">
                        <div class="thumb">${thumb}</div>
                        <div class="content">
                          <div class="top">
                            <h3>${t.nom}</h3>
                            <span class="badge ${badgeClass}">${t.formule.charAt(0).toUpperCase() + t.formule.slice(1)}</span>
                          </div>
                          <p class="card-sub">${t.pages} page${t.pages > 1 ? "s" : ""} · thème ${t.palette.theme}</p>
                          <div class="meta">
                            <span class="chip">${t.categorie}</span>
                            <span class="chip">${(t.polices || [])[0] || ""}</span>
                          </div>
                        </div>
                        <div class="arrow">Voir la démo →</div>
                      </a>
                    `;
                  });
                });
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Build batiment-serenite
        run: |
          cd templates/batiment-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/batiment-serenite
          mkdir -p ../../_site/batiment-serenite
          cp -r dist/. ../../_site/batiment-serenite

      - name: Build fastfood-serenite
        run: |
          cd templates/fastfood-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/fastfood-serenite
          cp -r dist/. ../../_site/fastfood-serenite

      - name: Build fleuriste-serenite
        run: |
          cd templates/fleuriste-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/fleuriste-serenite
          cp -r dist/. ../../_site/fleuriste-serenite

      - name: Build massage-starter
        run: |
          cd templates/massage-starter
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/massage-starter
          cp -r dist/. ../../_site/massage-starter

      - name: Build peintre-serenite
        run: |
          cd templates/peintre-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/peintre-serenite
          cp -r dist/. ../../_site/peintre-serenite

      - name: Build batipro-serenite
        run: |
          cd templates/batimentPro-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/batipro-serenite
          mkdir -p ../../_site/batipro-serenite
          cp -r dist/. ../../_site/batipro-serenite

      - name: Build restaurant-serenite
        run: |
          cd templates/restaurant-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/restaurant-serenite
          cp -r dist/. ../../_site/restaurant-serenite

      - name: Build barbershop-serenite
        run: |
          cd templates/barbershop-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/barbershop-serenite
          cp -r dist/. ../../_site/barbershop-serenite

      - name: Build electricien-serenite
        run: |
          cd templates/electricien-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/electricien-serenite
          cp -r dist/. ../../_site/electricien-serenite

      - name: Build plombier-serenite
        run: |
          cd templates/plombier-serenite
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/plombier-serenite
          cp -r dist/. ../../_site/plombier-serenite

      - name: Build electricien-croissance
        run: |
          cd templates/electricien-croissance
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/electricien-croissance
          mkdir -p ../../_site/electricien-croissance
          cp -r dist/. ../../_site/electricien-croissance

      - name: Build charpentier-couvreur-croissance
        run: |
          cd templates/charpentier-couvreur-croissance
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/charpentier-couvreur-croissance
          mkdir -p ../../_site/charpentier-couvreur-croissance
          cp -r dist/. ../../_site/charpentier-couvreur-croissance

      - name: Build coiffure-femme-croissance
        run: |
          cd templates/coiffure-femme-croissance
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/coiffure-femme-croissance
          mkdir -p ../../_site/coiffure-femme-croissance
          cp -r dist/. ../../_site/coiffure-femme-croissance

      - name: Build menuisier-croissance
        run: |
          cd templates/menuisier-croissance
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/menuisier-croissance
          mkdir -p ../../_site/menuisier-croissance
          cp -r dist/. ../../_site/menuisier-croissance

      - name: Build paysagiste-elageur-croissance
        run: |
          cd templates/paysagiste-elageur-croissance
          npm install
          npx astro build --site https://loic66600.github.io --base /lorn-templates/paysagiste-elageur-croissance
          mkdir -p ../../_site/paysagiste-elageur-croissance
          cp -r dist/. ../../_site/paysagiste-elageur-croissance

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
